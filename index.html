<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Satisfação das Aulas em tempo real</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f8ff;
color:#0b3d91;
text-align:center;
padding:40px;
}

.logo{
width:220px;
margin-bottom:20px;
}

h1{
margin-bottom:40px;
}

.materia{
background:white;
padding:20px;
margin:15px auto;
width:340px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
font-size:22px;
padding:10px 20px;
margin:10px;
cursor:pointer;
border:none;
border-radius:8px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.good{
background:#0b5ed7;
color:white;
}

.bad{
background:#6c757d;
color:white;
}

.score{
font-size:18px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQY9gl2nZRmYMl6GN5bQaANU-M5dTlUycE_aQ&s" 
style="width:220px; margin-bottom:20px;">

<h1>Real-time Class Satisfaction</h1>

<div id="aulas"></div>

<script>

const materias = [
"Marketing Analytics",
"Storytelling",
"Redação Publicitária",
"Planejamento de Mídia",
"Branding",
]

let votos = {}

materias.forEach(m=>{
votos[m]={good:0,bad:0}
})

const container = document.getElementById("aulas")

materias.forEach(nome=>{
const div=document.createElement("div")
div.className="materia"

div.innerHTML=`
<h3>${nome}</h3>
<button class="good" onclick="vote('${nome}','good')">👍 Gostando</button>
<button class="bad" onclick="vote('${nome}','bad')">👎 Ruim</button>
<div class="score" id="score-${nome}">👍 0 | 👎 0</div>
`

container.appendChild(div)
})

function updateUI(){
materias.forEach(nome=>{
document.getElementById("score-"+nome).innerText =
"👍 "+votos[nome].good+" | 👎 "+votos[nome].bad
})
}

const channel = new BroadcastChannel("votacao_aula")

channel.onmessage = (msg)=>{
votos = msg.data
updateUI()
}

function vote(materia,tipo){

votos[materia][tipo]++

channel.postMessage(votos)

updateUI()

}

</script>

</body>
</html>
